name: 早报

on:
  schedule:
    - cron: '33 23 * * 1-5'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pip install yfinance
      - env:
          FEISHU_URL: ${{ secrets.FEISHU_URL }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          REPORT_MODE: am
        run: python app/gh_daily_report.py
      - run: |
          git config user.name bot && git config user.email bot@report
          git pull --rebase origin master || true
          git add reports/am/ 2>/dev/null || true
          git diff --staged --quiet || (git commit -m "早报 $(date '+%Y-%m-%d')" && git push || true)
